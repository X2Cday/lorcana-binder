<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My-Lorcana-TCG / Upload</title>
  <link rel="icon" href="{{ url_for('static', filename='Lorcana Favicon.png') }}" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <nav class="bg-slate-900 border-b border-slate-800 px-6 py-4">
    <h1 class="text-2xl font-bold tracking-wide">My-Lorcana-TCG</h1>
  </nav>
  <main class="px-6 py-10 max-w-xl mx-auto">
    <h2 class="text-xl font-semibold mb-6">Upload CSV File</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, msg in messages %}
          <div class="mb-4 p-3 rounded {{ 'bg-red-800' if category == 'error' else 'bg-green-800' }}">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST" enctype="multipart/form-data" class="space-y-4" autocomplete="off">
      <input 
        type="file" 
        name="csvfile" 
        class="w-full p-3 rounded bg-slate-800 border border-slate-700"
        autocomplete="off"
      >
      <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 px-4 py-2 rounded-lg font-medium w-full">Upload CSV</button>
    </form>
  </main>
</body>
</html>
