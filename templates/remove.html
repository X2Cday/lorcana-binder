<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My-Lorcana-TCG / Remove Cards</title>
  <link rel="icon" href="{{ url_for('static', filename='Lorcana Favicon.png') }}" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <nav class="bg-slate-900 border-b border-slate-800 px-6 py-4">
    <h1 class="text-2xl font-bold tracking-wide">My-Lorcana-TCG</h1>
  </nav>

  <main class="px-6 py-10 max-w-3xl mx-auto">
    <h2 class="text-xl font-semibold mb-6">Remove Cards</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, msg in messages %}
          <div class="mb-4 p-3 rounded {{ 'bg-red-800' if category == 'error' else 'bg-green-800' }}">
            {{ msg }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" class="space-y-4" autocomplete="off">
      {% for card in cards %}
      <label class="flex items-center gap-3 bg-slate-800 border border-slate-700 p-3 rounded hover:bg-slate-750 transition">
        <input 
          type="checkbox" 
          name="remove_ids" 
          value="{{ card.id }}" 
          class="h-5 w-5 accent-red-500"
          autocomplete="off"
        >
        <span>{{ card.name }} (Set {{ card.set }}, Qty {{ card.quantity }})</span>
      </label>
      {% else %}
      <p class="text-slate-400 text-center py-6">No cards in your collection to remove.</p>
      {% endfor %}

      <button 
        type="submit" 
        class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg font-medium w-full mt-4 transition"
      >
        Delete Selected Cards
      </button>
    </form>
  </main>
</body>
</html>
