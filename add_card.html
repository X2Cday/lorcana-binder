<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My-Lorcana-TCG / Add Card</title>
  <link rel="icon" href="{{ url_for('static', filename='Lorcana Favicon.png') }}" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <nav class="bg-slate-900 border-b border-slate-800 px-6 py-4">
    <h1 class="text-2xl font-bold tracking-wide">My-Lorcana-TCG</h1>
  </nav>

  <main class="px-6 py-10 max-w-xl mx-auto">
    <h2 class="text-xl font-semibold mb-6">Add a New Card</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, msg in messages %}
          <div class="mb-4 p-3 rounded {{ 'bg-red-800' if category == 'error' else 'bg-green-800' }}">
            {{ msg }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" class="space-y-4" autocomplete="off">
      <datalist id="no-suggestions"></datalist>

      <div>
        <label class="block mb-1 text-sm">Card Name</label>
        <input 
          name="name" 
          placeholder="Elsa - Snow Queen" 
          value="{{ form.name or '' }}" 
          class="w-full p-3 rounded bg-slate-800 border border-slate-700"
          autocomplete="off"
          spellcheck="false"
          autocorrect="off"
          autocapitalize="off"
          list="no-suggestions"
        >
      </div>

      <div>
        <label class="block mb-1 text-sm">Set Number</label>
        <input 
          name="set" 
          placeholder="007" 
          value="{{ form.set or '' }}" 
          class="w-full p-3 rounded bg-slate-800 border border-slate-700"
          autocomplete="off"
          spellcheck="false"
          autocorrect="off"
          autocapitalize="off"
          list="no-suggestions"
        >
      </div>

      <div>
        <label class="block mb-1 text-sm">Card Number</label>
        <input 
          name="card_number" 
          placeholder="94" 
          value="{{ form.card_number or '' }}" 
          class="w-full p-3 rounded bg-slate-800 border border-slate-700"
          autocomplete="off"
          spellcheck="false"
          autocorrect="off"
          list="no-suggestions"
        >
      </div>

      <div>
        <label class="block mb-1 text-sm">Quantity</label>
        <input 
          name="quantity" 
          type="number" 
          value="{{ form.quantity or 1 }}" 
          class="w-full p-3 rounded bg-slate-800 border border-slate-700"
          autocomplete="off"
          list="no-suggestions"
        >
      </div>

      <div>
        <label class="block mb-1 text-sm">Your Price (GBP)</label>
        <input 
          name="my_price_gbp" 
          type="number" 
          step="0.01" 
          value="{{ form.my_price_gbp or 0.00 }}" 
          class="w-full p-3 rounded bg-slate-800 border border-slate-700"
          autocomplete="off"
          list="no-suggestions"
        >
      </div>

      <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg font-medium w-full">
        Add Card
      </button>
    </form>
  </main>
</body>
</html>
